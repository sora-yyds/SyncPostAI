# Refer https://docs.halo.run/developer-guide/plugin/basics/manifest

apiVersion: plugin.halo.run/v1alpha1
kind: Plugin
metadata:
  name: SyncPostAI
spec:
  enabled: true
  requires: ">=2.23.0"
  author:
    name: "--sora--"
    website: https://s-o-r-a.top/
  logo: syncpostai-logo.png
  settingName: syncpostai-settings
  configMapName: syncpostai-configmap
  homepage: https://github.com/sora-yyds/SyncPostAI#readme
  repo: https://github.com/sora-yyds/SyncPostAI/
  issues: https://github.com/sora-yyds/SyncPostAI/issues
  displayName: "智稿同步（SyncPostAI）"
  description: "面向 Halo 的外部文章推送插件，支持 AI 系统、自动化脚本和第三方服务通过 Token 鉴权发布 Markdown、HTML 或文本文章。"
  license:
    - name: "GPL-3.0"
      url: "https://github.com/sora-yyds/SyncPostAI/blob/main/LICENSE"
