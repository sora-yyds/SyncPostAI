apiVersion: v1alpha1
kind: Role
metadata:
  name: starter-role-ai-article-push-anonymous
  labels:
    halo.run/role-template: "true"
    halo.run/hidden: "true"
    rbac.authorization.halo.run/aggregate-to-anonymous: "true"
  annotations:
    rbac.authorization.halo.run/module: "SyncPostAI"
    rbac.authorization.halo.run/display-name: "Push AI articles"
rules:
  - apiGroups: ["api.starter.halo.run"]
    resources: ["articles"]
    verbs: ["create"]
